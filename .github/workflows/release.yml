name: Release Module

# Builds a Foundry-installable release whenever a v* tag is pushed.
# The published manifest/download URLs use the "releases/latest/download"
# pattern so the manifest link stays stable across versions.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: vars
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp module.json version
        run: |
          node -e '
            const fs = require("fs");
            const m = JSON.parse(fs.readFileSync("module.json", "utf8"));
            m.version = process.env.VERSION;
            fs.writeFileSync("module.json", JSON.stringify(m, null, "\t") + "\n");
          '
        env:
          VERSION: ${{ steps.vars.outputs.version }}

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            scripts \
            styles \
            lang \
            README.md \
            CHANGELOG.md \
            LICENSE

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
